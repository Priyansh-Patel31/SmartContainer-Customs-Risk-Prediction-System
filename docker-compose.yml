version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: smartcontainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcontainer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: smartcontainer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: smartcontainer-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartcontainer_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      APP_JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      APP_JWT_EXPIRATION_MS: 28800000
      APP_UPLOAD_DIR: /app/data/uploads
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_EMAIL: admin@smartcontainer.local
      APP_ADMIN_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin@12345}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
    volumes:
      - upload_data:/app/data/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  upload_data:
  backend_logs:
