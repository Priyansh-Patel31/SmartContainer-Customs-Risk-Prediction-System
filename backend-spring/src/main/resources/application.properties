# ══════════════════════════════════════════════════════════════
# SmartContainer Risk Engine — Spring Boot Configuration
# ══════════════════════════════════════════════════════════════

# ── Server ───────────────────────────────────────────────────
server.port=8080
spring.application.name=smartcontainer-risk-engine

# ── PostgreSQL Database ──────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcontainer_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Jackson (JSON) ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload-dir=./data/uploads

# ── JWT Authentication ───────────────────────────────────────
app.jwt.secret=change_this_secret_in_production
app.jwt.expiration-ms=28800000
# 28800000 ms = 8 hours

# ── Default Admin Seeding ────────────────────────────────────
app.admin.username=admin
app.admin.email=admin@smartcontainer.local
app.admin.password=Admin@12345

# ── ML Microservice ──────────────────────────────────────────
app.ml-service.url=http://localhost:8000
app.ml-service.timeout-ms=10000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:3000

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.smartcontainer=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/docs.json
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.persist-authorization=true
